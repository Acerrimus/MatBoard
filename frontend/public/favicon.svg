<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17191F"/>
      <stop offset="100%" stop-color="#0F1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  
  <!-- Border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#2A2C36" stroke-width="1"/>

  <!-- Grid — 3 cols × 4 rows, representing the matrix -->
  <!-- Row 1 -->
  <rect x="11" y="11" width="12" height="9" rx="2" fill="#22c55e" fill-opacity="0.85"/>
  <rect x="26" y="11" width="12" height="9" rx="2" fill="#22c55e" fill-opacity="0.85"/>
  <rect x="41" y="11" width="12" height="9" rx="2" fill="#eab308" fill-opacity="0.85"/>

  <!-- Row 2 -->
  <rect x="11" y="23" width="12" height="9" rx="2" fill="#eab308" fill-opacity="0.85"/>
  <rect x="26" y="23" width="12" height="9" rx="2" fill="#ef4444" fill-opacity="0.85"/>
  <rect x="41" y="23" width="12" height="9" rx="2" fill="#ef4444" fill-opacity="0.85"/>

  <!-- Row 3 -->
  <rect x="11" y="35" width="12" height="9" rx="2" fill="#22c55e" fill-opacity="0.85"/>
  <rect x="26" y="35" width="12" height="9" rx="2" fill="#22c55e" fill-opacity="0.85"/>
  <rect x="41" y="35" width="12" height="9" rx="2" fill="#eab308" fill-opacity="0.85"/>

  <!-- Row 4 -->
  <rect x="11" y="47" width="12" height="9" rx="2" fill="#ef4444" fill-opacity="0.85"/>
  <rect x="26" y="47" width="12" height="9" rx="2" fill="#eab308" fill-opacity="0.85"/>
  <rect x="41" y="47" width="12" height="9" rx="2" fill="#22c55e" fill-opacity="0.85"/>
</svg>