name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend — Vite Build ──────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Vite Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Dummy values — Vite requires these to be present at build time
          # Real values live in Vercel dashboard, never in this file
          VITE_SENTRY_DSN: https://public@dummy.ingest.sentry.io/0
          VITE_SUPABASE_URL: https://dummy.supabase.co
          VITE_SUPABASE_ANON_KEY: dummy_anon_key

  # ── Backend — Syntax Check ─────────────────────────────────────────────────
  backend-syntax:
    name: Backend — Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check — app/main.py
        run: python -m py_compile app/main.py

      - name: Syntax check — all routers
        run: |
          for f in app/routers/*.py; do
            echo "Checking $f"
            python -m py_compile "$f"
          done

      - name: Syntax check — supporting modules
        run: |
          for f in app/*.py; do
            echo "Checking $f"
            python -m py_compile "$f"
          done
